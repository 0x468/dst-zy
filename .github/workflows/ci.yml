name: CI

on:
  push:
    branches:
      - master
      - feat/**
  pull_request:

permissions:
  contents: read

jobs:
  runtime-image:
    name: Runtime Image Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build DST runtime image
        run: docker build -t dst-docker:ci .

  control-plane-backend:
    name: Control Plane Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Run Go tests
        run: go test ./...

  control-plane-frontend:
    name: Control Plane Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: control-plane/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  control-plane-deploy:
    name: Control Plane Deploy Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate dev compose config
        run: docker compose -f control-plane/deploy/docker-compose.control-plane.dev.yml config

      - name: Validate image compose config
        run: docker compose -f control-plane/deploy/docker-compose.control-plane.yml config

  control-plane-e2e:
    name: Control Plane E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build control-plane image
        run: docker build -f control-plane/Dockerfile -t dst-control-plane:v2-check .

      - name: Run create-cluster e2e
        run: bash control-plane/tests/e2e/create-cluster.sh

      - name: Run import-cluster e2e
        run: bash control-plane/tests/e2e/import-cluster.sh

      - name: Run image smoke
        run: bash control-plane/tests/e2e/smoke-image.sh

  formatting:
    name: Diff Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify diff cleanliness
        run: git diff --check
