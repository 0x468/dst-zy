services:
  control-plane-api:
    image: golang:1.26.1-bookworm
    working_dir: /workspace/control-plane/api
    command: ["go", "run", "./cmd/server"]
    environment:
      DST_CONTROL_PLANE_LISTEN_ADDR: :8080
      DST_CONTROL_PLANE_DATA_ROOT: /opt/dst-control-plane/data
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace/control-plane
      - ./data:/opt/dst-control-plane/data

  control-plane-web:
    image: node:22.22.1-bookworm
    working_dir: /workspace/control-plane/web
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "4173"]
    ports:
      - "4173:4173"
    volumes:
      - ..:/workspace/control-plane
