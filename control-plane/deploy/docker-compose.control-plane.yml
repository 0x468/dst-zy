services:
  control-plane:
    image: dst-control-plane:v2-alpha
    build:
      context: ../..
      dockerfile: control-plane/Dockerfile
    environment:
      DST_CONTROL_PLANE_LISTEN_ADDR: :8080
      DST_CONTROL_PLANE_DATA_ROOT: /opt/dst-control-plane/data
      DST_CONTROL_PLANE_WEB_STATIC_DIR: /opt/dst-control-plane/web
      DST_CONTROL_PLANE_EXECUTION_MODE: compose
      DST_CONTROL_PLANE_ADMIN_USERNAME: ${DST_CONTROL_PLANE_ADMIN_USERNAME:-admin}
      DST_CONTROL_PLANE_ADMIN_PASSWORD: ${DST_CONTROL_PLANE_ADMIN_PASSWORD:-change-me}
      DST_CONTROL_PLANE_SESSION_SECRET: ${DST_CONTROL_PLANE_SESSION_SECRET:-replace-me-with-a-long-random-secret}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/opt/dst-control-plane/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
